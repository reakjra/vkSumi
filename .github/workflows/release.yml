name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  arch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: install deps
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel meson ninja glslang vulkan-headers vulkan-icd-loader libx11 git sudo

      - uses: actions/checkout@v4

      - name: build .pkg.tar.zst
        run: |
          # makepkg refuses to run as root, set up a builder user
          useradd -m builder
          chown -R builder:builder .
          cp packaging/PKGBUILD .
          # patch in the version from the git tag
          ver="${GITHUB_REF_NAME#v}"
          [ -z "$ver" ] && ver="0.0.0"
          sed -i "s/^pkgver=.*/pkgver=$ver/" PKGBUILD
          # build from local checkout, not from the github tarball
          sed -i "s|source=.*|source=()|" PKGBUILD
          sed -i "s|sha256sums=.*|sha256sums=()|" PKGBUILD
          sed -i 's|cd vkSumi-\$pkgver||' PKGBUILD
          sudo -u builder makepkg --noconfirm

      - uses: softprops/action-gh-release@v2
        with:
          files: '*.pkg.tar.zst'

  debian:
    runs-on: ubuntu-latest
    container: debian:stable
    steps:
      - name: install deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            meson ninja-build glslang-tools libvulkan-dev libx11-dev pkg-config \
            gcc g++ dpkg-dev ca-certificates git

      - uses: actions/checkout@v4

      - name: build + package .deb
        run: |
          ver="${GITHUB_REF_NAME#v}"
          [ -z "$ver" ] && ver="0.0.0"
          meson setup build --prefix=/usr --buildtype=release
          ninja -C build
          DESTDIR="$PWD/pkgroot" meson install -C build
          mkdir -p pkgroot/DEBIAN
          cat > pkgroot/DEBIAN/control <<EOF
          Package: vksumi
          Version: $ver
          Section: graphics
          Priority: optional
          Architecture: amd64
          Maintainer: vkSumi <noreply@github.com>
          Depends: libvulkan1, libx11-6, libc6, libstdc++6, libgcc-s1
          Description: Vulkan layer for runtime color grading on Linux
           Adrenalin/Freestyle equivalent for Linux gaming.
           Brightness, contrast, saturation, hue, gamma, etc, with hot-reload.
          EOF
          dpkg-deb --build pkgroot "vksumi_${ver}_amd64.deb"

      - uses: softprops/action-gh-release@v2
        with:
          files: '*.deb'

  fedora:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: install deps
        run: |
          dnf install -y \
            meson ninja-build glslang vulkan-loader-devel libX11-devel pkgconf-pkg-config \
            gcc-c++ rpm-build rpmdevtools git tar

      - uses: actions/checkout@v4

      - name: build .rpm
        run: |
          ver="${GITHUB_REF_NAME#v}"
          [ -z "$ver" ] && ver="0.0.0"
          rpmdev-setuptree
          # bundle the source as a tarball for rpmbuild
          tar --exclude='./.git' --exclude='./build' --exclude='./builddir' \
              --exclude='./refs' --transform "s,^\.,vksumi-${ver}," \
              -czf ~/rpmbuild/SOURCES/vksumi-${ver}.tar.gz .
          sed "s/__VERSION__/${ver}/g" packaging/vksumi.spec > ~/rpmbuild/SPECS/vksumi.spec
          rpmbuild -bb ~/rpmbuild/SPECS/vksumi.spec
          mv ~/rpmbuild/RPMS/x86_64/*.rpm .

      - uses: softprops/action-gh-release@v2
        with:
          files: '*.rpm'
